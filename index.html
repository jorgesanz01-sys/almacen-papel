<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoreMap — Almacén de Papel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
<div class="app-container">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar glass-panel">
        <div class="brand">
            <i class="ri-stack-line icon-logo"></i>
            <h1>Store<span class="highlight">Map</span></h1>
        </div>

        <!-- BÚSQUEDA con autocompletado -->
        <div class="sidebar-search-wrap">
            <div class="sidebar-search">
                <i class="ri-search-line"></i>
                <input type="text" id="search-input" placeholder="Ref., tipo, pasillo..." autocomplete="off">
                <button id="search-clear" class="search-clear-btn" style="display:none" title="Limpiar">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div id="search-dropdown" class="search-dropdown" style="display:none"></div>
        </div>

        <nav class="nav-menu">
            <button class="nav-item active" data-view="map">
                <i class="ri-layout-grid-fill"></i> Mapa
            </button>
            <button class="nav-item" data-view="metrics">
                <i class="ri-bar-chart-2-fill"></i> Métricas
            </button>
            <button class="nav-item" data-view="articles">
                <i class="ri-archive-2-line"></i> Artículos
            </button>
            <button class="nav-item" data-view="history">
                <i class="ri-history-line"></i> Historial
            </button>
        </nav>

        <!-- SUBIR EXCEL -->
        <div class="sidebar-excel-section">
            <button class="nav-item excel-btn" id="upload-inventory-btn" title="Subir inventario completo desde Excel">
                <i class="ri-file-excel-2-line"></i> Subir Inventario
            </button>
            <input type="file" id="inventory-excel-input" accept=".xls,.xlsx" style="display:none">
            <button class="nav-item excel-btn" id="upload-kgpalet-btn" onclick="importArticleConfig()" title="Importar Kg/Palet desde Excel">
                <i class="ri-upload-2-line"></i> Importar Kg/Palet
            </button>
            <input type="file" id="art-excel-input" accept=".xls,.xlsx" style="display:none" onchange="handleExcelImport(event)">
        </div>

        <div class="global-stats">
            <h3>Ocupación Global</h3>
            <div class="stat-card">
                <div class="stat-value" id="global-ocupation">—</div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="global-progress" style="width:0%"></div>
                </div>
            </div>
        </div>

        <div class="legend">
            <h3>Leyenda</h3>
            <div class="legend-item"><span class="color-box empty"></span> &lt;30% Libre</div>
            <div class="legend-item"><span class="color-box medium"></span> 30–75% Óptimo</div>
            <div class="legend-item"><span class="color-box full"></span> &gt;75% Saturado</div>
        </div>

        <div class="sidebar-status">
            <div class="status-indicator" id="sidebar-status">En vivo (Firestore)</div>
        </div>
    </aside>

    <!-- ── MAIN ── -->
    <main class="main-content">

        <!-- MAPA -->
        <div class="warehouse-canvas glass-panel" id="view-map">
            <div class="canvas-header">
                <h2>Plano del Almacén</h2>
            </div>
            <div class="warehouse-grid" id="warehouse-grid"></div>
        </div>

        <!-- MÉTRICAS -->
        <div class="warehouse-canvas glass-panel view-panel metrics-dashboard" id="view-metrics" style="display:none">
            <div class="canvas-header" style="flex-shrink:0;">
                <h2>Métricas del Almacén</h2>
            </div>
            
            <!-- Contenedor General para el Grid de Métricas -->
            <div class="metrics-dashboard-grid">
                
                <!-- Tarjetas KPI Globales -->
                <div class="metrics-kpis-wrapper">
                    <h3>Visión General</h3>
                    <div class="metrics-grid" id="metrics-kpis"></div>
                </div>

                <!-- Rankings y Listados distribuidos en grid -->
                <div class="metrics-rankings-wrapper" id="metrics-rankings-wrapper">
                    <div class="top-list-box" id="metrics-top-aisles-box">
                        <div class="top-list-header"><i class="ri-bar-chart-horizontal-fill"></i> Top pasillos por ocupación</div>
                        <div class="top-list-body" id="metrics-top-body"></div>
                    </div>
                    
                    <div class="top-list-box" id="metrics-top-articles-box">
                        <div class="top-list-header"><i class="ri-archive-draw-fill"></i> Papeles con más volumen</div>
                        <div class="top-list-body" id="metrics-top-articles-body"></div>
                    </div>

                    <div class="top-list-box" id="metrics-grammages-box">
                        <div class="top-list-header"><i class="ri-pie-chart-2-fill"></i> Distribución por Gramaje</div>
                        <div class="top-list-body" id="metrics-grammages-body"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ARTÍCULOS -->
        <div class="warehouse-canvas glass-panel view-panel" id="view-articles" style="display:none"></div>

        <!-- HISTORIAL -->
        <div class="warehouse-canvas glass-panel view-panel" id="view-history" style="display:none">
            <div class="canvas-header" style="flex-shrink:0;">
                <h2>Historial de Actividad</h2>
            </div>
            <div class="history-list" id="history-list" style="flex:1;overflow-y:auto;"></div>
        </div>

    </main>
</div>

<!-- Inspector -->
<div id="inspector-panel" class="inspector-panel"></div>
<!-- Modal edición pasillo -->
<div id="edit-modal"></div>

<!-- Firebase -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, doc, onSnapshot, setDoc, getDocs }
        from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
    const firebaseConfig = {
        databaseURL: "https://almacen-papel-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "almacen-papel"
    };
    try {
        const app = initializeApp(firebaseConfig);
        window.firebaseDb         = getFirestore(app);
        window.firebaseCollection = collection;
        window.firebaseDoc        = doc;
        window.firebaseOnSnapshot = onSnapshot;
        window.firebaseSetDoc     = setDoc;
        window.firebaseGetDocs    = getDocs;
    } catch(e) { console.error("Firebase error", e); }
</script>
<script type="module" src="app.js"></script>
</body>
</html>
